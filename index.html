  /* ========== 全局 ========== */
  body, .app, .input, .btn-add, .tab, .todo-item, .progress-fill {
    transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease, color 0.4s ease;
  }

  html { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background-color: var(--bg-color);
    min-height: 100dvh;
    display: flex; align-items: stretch; justify-content: center;
    -webkit-font-smoothing: antialiased;
  }

  [data-theme="lumu"] .app {
    background: rgba(30,15,40,0.55);
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
  }

  /* ========== 背景光晕 ========== */
  .bg-orb {
    position: fixed; border-radius: 50%; filter: blur(100px);
    pointer-events: none;
    animation: orbFloat 20s ease-in-out infinite;
  }
  .bg-orb--1 {
    width: 300px; height: 300px; background: var(--orb1);
    top: -8%; left: -5%;
  }
  .bg-orb--2 {
    width: 260px; height: 260px; background: var(--orb2);
    bottom: -8%; right: -5%; animation-delay: -7s; animation-duration: 24s;
  }
  .bg-orb--3 {
    width: 220px; height: 220px; background: var(--orb3);
    top: 40%; left: 55%; animation-delay: -14s; animation-duration: 18s;
  }
  @keyframes orbFloat {
    0%,100%{transform:translate(0,0) scale(1)}
    25%{transform:translate(40px,-30px) scale(1.06)}
    50%{transform:translate(-20px,35px) scale(0.95)}
    75%{transform:translate(-35px,-20px) scale(1.04)}
  }

  /* ========== 主容器 ========== */
  .app {
    width: 100%; max-width: 480px;
    background: var(--card-bg); backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
    border-left: 1px solid var(--border); border-right: 1px solid var(--border);
    padding: 20px 20px 16px;
    display: flex; flex-direction: column;
    box-shadow: var(--card-shadow);
    position: relative; z-index: 1;
  }
  @media (min-width: 481px) {
    .app {
      border-radius: 20px; border: 1px solid var(--border);
      margin: 10px 0; min-height: auto; align-self: center;
    }
  }
  @media (max-width: 480px) {
    .app { min-height: 100dvh; border: none; }
  }

  /* ========== 标题 ========== */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .title { font-size: 22px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.3px; }
  .title-emoji { font-size: 26px; margin-right: 2px; }
  .header-actions { display: flex; gap: 4px; }
  .header-actions button {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-secondary); font-size: 14px; cursor: pointer;
    padding: 6px 9px; border-radius: 8px; font-family: inherit;
    transition: all 0.15s ease;
  }
  .header-actions button:hover { background: var(--surface-hover); color: var(--text-primary); }

  /* ========== 搜索 ========== */
  .search-wrap {
    margin-bottom: 12px; overflow: hidden;
    max-height: 0; opacity: 0; transition: max-height 0.25s ease, opacity 0.25s ease, margin 0.25s ease;
  }
  .search-wrap.open { max-height: 44px; opacity: 1; margin-bottom: 12px; }
  .search-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 9px 12px; font-size: 14px;
    color: var(--text-primary); outline: none; font-family: inherit;
  }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .search-input::placeholder { color: var(--text-muted); }

  /* ========== 进度 ========== */
  .progress-section { margin-bottom: 12px; }
  .progress-stats { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
  .progress-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
  .progress-count { font-size: 12px; color: var(--text-secondary); font-weight: 600; }
  .progress-count span { color: var(--text-primary); font-size: 14px; font-weight: 700; }
  .progress-track { height: 5px; background: var(--surface); border-radius: 3px; overflow: hidden; }
  .progress-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--success));
    transition: width 0.4s ease; box-shadow: 0 0 10px var(--accent-glow);
  }

  /* ========== 输入 ========== */
  .input-row { display: flex; gap: 6px; margin-bottom: 6px; }
  .input {
    flex: 1; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 12px; font-size: 16px;
    color: var(--text-primary); outline: none; font-family: inherit;
  }
  .input::placeholder { color: var(--text-muted); }
  .input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

  .btn-add {
    width: 40px; height: 40px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent), var(--success));
    border: none; border-radius: var(--radius-sm); color: #fff;
    font-size: 20px; cursor: pointer; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 12px var(--accent-glow);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .btn-add:hover { transform: scale(1.05); }
  .btn-add:active { transform: scale(0.95); }

  /* 选项面板 */
  .options-panel {
    display: flex; flex-direction: column; gap: 8px;
    margin-bottom: 12px;
  }
  .opt-row { display: flex; align-items: center; gap: 6px; }
  .opt-label {
    font-size: 12px; color: var(--text-secondary); font-weight: 500;
    flex-shrink: 0; min-width: 72px;
  }
  .opt-btns { display: flex; gap: 4px; flex-wrap: wrap; }
  .opt-btn {
    padding: 5px 10px; font-size: 12px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-secondary); cursor: pointer; font-family: inherit;
    transition: all 0.15s ease; white-space: nowrap;
  }
  .opt-btn:hover { border-color: var(--text-muted); }
  .opt-btn.sel { border-color: var(--accent); background: var(--accent-glow); color: var(--accent); font-weight: 600; }
  .opt-date {
    padding: 5px 10px; font-size: 12px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-secondary); outline: none; font-family: inherit; cursor: pointer;
    flex: 1; max-width: 180px;
  }
  .opt-date:focus { border-color: var(--accent); }

  /* ========== 筛选 ========== */
  .tabs {
    display: flex; gap: 3px; margin-bottom: 6px;
    background: var(--surface); border-radius: var(--radius-sm); padding: 3px;
  }
  .tab {
    flex: 1; padding: 7px 0; border: none; background: transparent;
    color: var(--text-secondary); font-size: 12px; font-weight: 600;
    cursor: pointer; border-radius: 7px; font-family: inherit; transition: all 0.15s ease;
  }
  .tab.active { background: var(--tab-active-bg); color: var(--text-primary); box-shadow: var(--tab-active-shadow); }
  .category-filters { display: flex; gap: 3px; margin-bottom: 10px; flex-wrap: wrap; }
  .cat-chip {
    padding: 3px 9px; font-size: 11px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-secondary); cursor: pointer; font-family: inherit; transition: all 0.15s ease;
  }
  .cat-chip:hover { border-color: var(--text-muted); }
  .cat-chip.active { background: var(--surface-hover); color: var(--text-primary); font-weight: 600; }

  /* ========== 任务列表 ========== */
  .todo-list {
    list-style: none; display: flex; flex-direction: column; gap: 4px;
    flex: 1; min-height: 60px; margin-bottom: 2px;
  }
  .todo-item {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 10px; background: var(--surface);
    border: 1px solid transparent; border-radius: var(--radius-sm);
    transition: all 0.2s ease; position: relative; user-select: none;
    animation: itemIn 0.3s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  .todo-item:hover { background: var(--surface-hover); border-color: var(--border); }
  .todo-item.removing { animation: itemOut 0.25s cubic-bezier(0.55, 0, 1, 0.45) forwards; }
  .todo-item.dragging { opacity: 0.35; transform: scale(0.96); }
  .todo-item.drag-over { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
  @keyframes itemIn { from{opacity:0;transform:translateY(-6px) scale(0.96)} to{opacity:1;transform:translateY(0) scale(1)} }
  @keyframes itemOut { to{opacity:0;transform:translateX(30px) scale(0.9);max-height:0;padding:0;margin:0} }

  .drag-handle {
    color: var(--text-muted); font-size: 13px; cursor: grab;
    padding: 2px 0; opacity: 0; transition: opacity 0.15s ease; flex-shrink: 0;
  }
  .todo-item:hover .drag-handle { opacity: 1; }
  .drag-handle:active { cursor: grabbing; }

  .priority-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .priority-dot.high   { background: #e17055; box-shadow: 0 0 6px rgba(225,112,85,0.45); }
  .priority-dot.medium { background: #e2a835; box-shadow: 0 0 6px rgba(226,168,53,0.45); }
  .priority-dot.low    { background: rgba(0,0,0,0.18); box-shadow: none; }

  .todo-check {
    width: 20px; height: 20px; flex-shrink: 0; border-radius: 50%;
    border: 2px solid rgba(0,0,0,0.18);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s ease; font-size: 11px; color: transparent;
  }
  .todo-item.done .todo-check {
    background: var(--success); border-color: var(--success);
    color: #fff; box-shadow: 0 0 8px rgba(0,184,148,0.3);
  }

  .todo-body { flex: 1; min-width: 0; }
  .todo-text { font-size: 14px; color: var(--text-primary); word-break: break-word; transition: all 0.2s ease; }
  .todo-item.done .todo-text { color: var(--text-muted); text-decoration: line-through; text-decoration-color: var(--text-muted); }
  .todo-meta { display: flex; gap: 4px; align-items: center; margin-top: 1px; flex-wrap: wrap; }

  .due-badge {
    font-size: 10px; padding: 1px 6px; border-radius: 8px;
    background: var(--surface); color: var(--text-secondary); white-space: nowrap;
  }
  .due-badge.soon { color: #e2a835; background: rgba(226,168,53,0.1); }
  .due-badge.overdue { color: #e17055; background: rgba(225,112,85,0.1); animation: pulse 1.5s ease infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .cat-tag {
    font-size: 10px; padding: 2px 7px; border-radius: 8px;
    font-weight: 600; white-space: nowrap; flex-shrink: 0;
  }
  .cat-tag.work     { background: rgba(108,92,231,0.12); color: #6c5ce7; }
  .cat-tag.personal { background: rgba(0,184,148,0.12); color: #00b894; }
  .cat-tag.study    { background: rgba(226,168,53,0.12); color: #c68a0a; }
  .cat-tag.other    { background: var(--surface); color: var(--text-secondary); }

  .todo-edit-input {
    flex: 1; background: var(--card-bg-solid); border: 1px solid var(--accent);
    border-radius: 6px; padding: 3px 8px; font-size: 14px;
    color: var(--text-primary); outline: none; font-family: inherit;
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .todo-delete {
    width: 28px; height: 28px; flex-shrink: 0; background: none; border: none;
    color: var(--text-muted); font-size: 13px; cursor: pointer; border-radius: 50%;
    transition: all 0.15s ease; display: flex; align-items: center; justify-content: center;
    opacity: 0; transform: scale(0.8);
  }
  .todo-item:hover .todo-delete { opacity: 1; transform: scale(1); }
  .todo-delete:hover { color: #fff; background: var(--danger); }

  /* ========== 底部 ========== */
  .footer {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border);
  }
  .remaining { font-size: 12px; color: var(--text-secondary); font-weight: 500; }
  .btn-clear {
    font-size: 12px; color: var(--text-muted); background: none;
    border: none; cursor: pointer; font-weight: 500;
    font-family: inherit; padding: 5px 8px; border-radius: 6px; transition: all 0.15s ease;
  }
  .btn-clear:hover { color: var(--danger); background: rgba(225,112,85,0.08); }

  /* ========== 空状态 ========== */
  .empty-state {
    text-align: center; padding: 40px 0 16px; color: var(--text-muted);
    font-size: 13px;
  }
  .empty-state .empty-icon { font-size: 44px; display: block; margin-bottom: 10px; opacity: 0.5; }

  /* ========== 确认弹窗 ========== */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.3); backdrop-filter: blur(3px);
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .modal-card {
    background: var(--card-bg-solid); backdrop-filter: blur(40px);
    border: 1px solid var(--border); border-radius: 16px;
    padding: 24px 20px 16px; max-width: 300px; width: 90%;
    text-align: center; box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    animation: modalIn 0.25s cubic-bezier(0.22, 0.61, 0.36, 1);
  }
  @keyframes modalIn { from{opacity:0;transform:scale(0.92) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }
  .modal-icon { font-size: 36px; margin-bottom: 6px; }
  .modal-title { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
  .modal-text { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; word-break: break-word; }
  .modal-actions { display: flex; gap: 8px; }
  .modal-btn {
    flex: 1; padding: 9px 0; border-radius: 10px; font-size: 13px;
    font-weight: 600; cursor: pointer; font-family: inherit; border: none; transition: all 0.15s ease;
  }
  .modal-btn-cancel { background: var(--surface); color: var(--text-secondary); }
  .modal-btn-cancel:hover { background: var(--surface-hover); }
  .modal-btn-danger { background: var(--danger); color: #fff; }
  .modal-btn-danger:hover { filter: brightness(1.1); }

  /* ========== Toast ========== */
  .toast {
    position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.78); color: #fff; padding: 8px 20px;
    border-radius: 20px; font-size: 12px; z-index: 100; pointer-events: none;
    animation: toastIn 0.25s ease, toastOut 0.25s ease 1.8s forwards;
  }
  @keyframes toastIn  { from{opacity:0;transform:translateX(-50%) translateY(8px)} }
  @keyframes toastOut { to{opacity:0;transform:translateX(-50%) translateY(-8px)} }

  /* ========== 主题切换 ========== */
  .theme-switcher {
    display: flex; flex-wrap: wrap; gap: 5px; align-items: center;
  }
  .theme-btn {
    width: 32px; height: 32px; border-radius: 50%;
    border: 2px solid var(--border); cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface); transition: all 0.2s ease;
  }
  .theme-btn:hover { transform: scale(1.12); border-color: var(--text-muted); }
  .theme-btn.active { border-color: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }
  .theme-btn-add { opacity: 0.6; font-size: 13px; }
  .theme-btn-add:hover { opacity: 1; }

  /* ========== 响应式 ========== */
  @media (max-width: 480px) {
    .app { padding: 16px 14px 12px; }
    .title { font-size: 20px; }
    .opt-label { min-width: 60px; font-size: 11px; }
    .theme-btn { width: 28px; height: 28px; font-size: 13px; }
  }
</style>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>

<!-- 背景氛围光晕，通过 CSS 动画浮动，营造沉浸式视觉效果 -->
<div class="bg-orb bg-orb--1"></div>
<div class="bg-orb bg-orb--2"></div>
<div class="bg-orb bg-orb--3"></div>

<!-- 全局 Toast 提示条，固定底部居中，自动消失 -->
<div class="toast" id="toast" style="display:none"></div>
<!-- 模态弹窗容器，动态注入确认对话框 HTML -->
<div id="modalContainer"></div>
<!-- 隐藏的文件选择器，供自定义主题上传背景图片使用 -->
<input type="file" id="customImageInput" accept="image/*" style="display:none">

<main class="app">
  <!-- 顶部标题栏，包含应用名称和搜索/导出/导入操作按钮 -->
  <div class="header">
    <h1 class="title"><span class="title-emoji">✨</span>待办清单</h1>
    <div class="header-actions">
      <button id="btnSearch" title="搜索">🔍</button>
      <button id="btnExport" title="导出">📥</button>
      <button id="btnImport" title="导入">📤</button>
    </div>
  </div>

  <!-- 搜索输入区，默认收起，点击搜索按钮展开，使用 max-height 动画实现平滑过渡 -->
  <div class="search-wrap" id="searchWrap">
    <input class="search-input" id="searchInput" type="text" placeholder="搜索任务..." autocomplete="off">
  </div>

  <!-- 进度条区域，显示完成数量/总数及百分比进度条 -->
  <div class="progress-section">
    <div class="progress-stats">
      <span class="progress-label"><span style="background:linear-gradient(90deg,#6ea8fe 50%,#e891b0 50%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">❤</span> 完成进度</span>
      <span class="progress-count"><span id="doneCount">0</span> / <span id="totalCount">0</span></span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <!-- 任务输入行：文本输入框 + 添加按钮 -->
  <div class="input-row">
    <input class="input" id="todoInput" type="text" placeholder="添加一个新任务..." maxlength="200" autocomplete="off">
    <button class="btn-add" id="btnAdd" title="添加任务">＋</button>
  </div>

  <!-- 选项面板：优先级、分类、截止日期、主题切换 -->
  <div class="options-panel" id="optionsPanel">
    <div class="opt-row">
      <span class="opt-label">⭐ 优先级</span>
      <div class="opt-btns">
        <button class="opt-btn sel" data-opt="priority" data-val="medium">🟡 中</button>
        <button class="opt-btn" data-opt="priority" data-val="high">🔴 高</button>
        <button class="opt-btn" data-opt="priority" data-val="low">🟢 低</button>
      </div>
    </div>
    <div class="opt-row">
      <span class="opt-label">🏷️ 分类</span>
      <div class="opt-btns">
        <button class="opt-btn sel" data-opt="category" data-val="personal">🏠 个人</button>
        <button class="opt-btn" data-opt="category" data-val="work">💼 工作</button>
        <button class="opt-btn" data-opt="category" data-val="study">📚 学习</button>
      </div>
    </div>
    <div class="opt-row">
      <span class="opt-label">📅 截止日期</span>
      <input class="opt-date" id="dueDateInput" type="date">
      <button class="opt-btn" id="btnClearDate" style="display:none">✕ 清除</button>
    </div>
    <div class="opt-row">
      <span class="opt-label">🎨 主题</span>
      <div class="theme-switcher">
        <button class="theme-btn active" data-theme="lumu" title="橹穆·紫">💜</button>
        <button class="theme-btn" data-theme="lumu2" title="橹穆·蓝">💙</button>
        <button class="theme-btn" data-theme="lumu4" title="橹穆·靛">💜</button>
        <button class="theme-btn theme-btn-add" id="btnAddTheme" title="自定义主题">➕</button>
        <button class="theme-btn theme-btn-add" id="btnAutoTheme" title="自动轮播主题">▶</button>
        <span id="customThemes"></span>
      </div>
    </div>
  </div>

  <!-- 状态筛选标签页：全部/进行中/已完成 -->
  <div class="tabs">
    <button class="tab active" data-filter="all">📋 全部</button>
    <button class="tab" data-filter="active">🔄 进行中</button>
    <button class="tab" data-filter="done">✅ 已完成</button>
  </div>

  <!-- 分类筛选标签：按工作/个人/学习/其他过滤任务 -->
  <div class="category-filters" id="categoryFilters">
    <button class="cat-chip active" data-cat="">全部标签</button>
    <button class="cat-chip" data-cat="work">💼 工作</button>
    <button class="cat-chip" data-cat="personal">🏠 个人</button>
    <button class="cat-chip" data-cat="study">📚 学习</button>
    <button class="cat-chip" data-cat="other">🎯 其他</button>
  </div>

  <!-- 任务列表，由 JS 动态渲染，支持拖拽排序、内联编辑 -->
  <ul class="todo-list" id="todoList"></ul>

  <!-- 底部栏：剩余任务计数 + 清空已完成按钮 -->
  <div class="footer">
    <span class="remaining" id="remainingLabel"></span>
    <button class="btn-clear" id="btnClear">🗑 清空已完成</button>
  </div>
</main>

<!-- 隐藏的文件选择器，供 JSON 导入功能触发文件选择对话框 -->
<input type="file" id="fileImport" accept=".json" style="display:none">

<script>
(function() {
  const $input = document.getElementById('todoInput');
  const $btnAdd = document.getElementById('btnAdd');
  const $optionsPanel = document.getElementById('optionsPanel');
  const $dueDateInput = document.getElementById('dueDateInput');
  const $btnClearDate = document.getElementById('btnClearDate');
  const $list = document.getElementById('todoList');
  const $tabs = document.querySelector('.tabs');
  const $categoryFilters = document.getElementById('categoryFilters');
  const $doneCount = document.getElementById('doneCount');
  const $totalCount = document.getElementById('totalCount');
  const $progressFill = document.getElementById('progressFill');
  const $remainingLabel = document.getElementById('remainingLabel');
  const $btnClear = document.getElementById('btnClear');
  const $searchWrap = document.getElementById('searchWrap');
  const $searchInput = document.getElementById('searchInput');
  const $btnSearch = document.getElementById('btnSearch');
  const $btnExport = document.getElementById('btnExport');
  const $btnImport = document.getElementById('btnImport');
  const $fileImport = document.getElementById('fileImport');
  const $toast = document.getElementById('toast');
  const $modalContainer = document.getElementById('modalContainer');

  // ========== 应用状态 ==========
  let todos = [];                   // 任务数据数组，持久化到 localStorage
  let filter = 'all';              // 当前状态筛选：'all' | 'active' | 'done'
  let categoryFilter = '';         // 当前分类筛选：'' 表示不筛选
  let searchQuery = '';            // 搜索关键词
  let addOptions = { priority: 'medium', category: 'personal' }; // 新增任务时的默认选项
  let toastTimer = null;           // Toast 自动消失的定时器句柄

  // 全局轻提示，底部居中显示，约 2 秒后自动消失
  function toast(msg) {
    clearTimeout(toastTimer);
    $toast.textContent = msg; $toast.style.display = '';
    // 先重置动画再触发回流，确保动画每次都能从头播放
    $toast.style.animation = 'none'; void $toast.offsetHeight;
    $toast.style.animation = 'toastIn 0.25s ease, toastOut 0.25s ease 1.8s forwards';
    // 动画总时长约 2.05s，延迟 2.1s 隐藏元素确保动画播放完毕
    toastTimer = setTimeout(() => { $toast.style.display = 'none'; }, 2100);
  }

  // 通用确认弹窗，返回 Promise<boolean>，支持异步等待用户选择
  // 点击遮罩层、Esc 键、取消按钮均视为取消（resolve false）
  function showConfirm({ icon, title, text, confirmText, onConfirm }) {
    return new Promise(resolve => {
      // 1. 动态注入弹窗 HTML
      $modalContainer.innerHTML = `<div class="modal-overlay"><div class="modal-card">
        <div class="modal-icon">${icon||'⚠️'}</div>
        <div class="modal-title">${title}</div>
        <div class="modal-text">${escapeHtml(text)}</div>
        <div class="modal-actions">
          <button class="modal-btn modal-btn-cancel" id="modalCancel">取消</button>
          <button class="modal-btn modal-btn-danger" id="modalConfirm">${confirmText||'确认删除'}</button>
        </div></div></div>`;
      const $overlay = $modalContainer.querySelector('.modal-overlay');
      const close = r => { $modalContainer.innerHTML = ''; resolve(r); };
      // 2. 绑定关闭事件
      $modalContainer.querySelector('#modalCancel').addEventListener('click', () => close(false));
      $modalContainer.querySelector('#modalConfirm').addEventListener('click', () => close(true));
      // 点击遮罩层外部区域关闭（仅当点击目标为遮罩本身，不冒泡到内部卡片）
      $overlay.addEventListener('click', e => { if(e.target===$overlay) close(false); });
      // 按 Esc 键关闭，使用具名函数以便移除监听器防止内存泄漏
      document.addEventListener('keydown', function esc(e) { if(e.key==='Escape'){document.removeEventListener('keydown',esc);close(false);} });
    });
  }

  // 数据迁移：为旧版本数据补全缺失字段，保证向后兼容
  // 旧版本可能没有 id/priority/category/order 字段
  function migrate(t) {
    if(!t.id) t.id = Date.now() + Math.random(); // 为无 ID 的旧数据生成唯一标识
    if(!t.priority) t.priority = 'medium';
    if(!t.category) t.category = '';
    if(t.order===undefined) t.order = 0; // 未设置排序位置时置为 0
  }

  // 从 localStorage 加载任务数据，加载后自动迁移旧格式数据
  function loadTodos() {
    try { const r = localStorage.getItem('cool-todos-pro'); todos = r ? JSON.parse(r) : []; todos.forEach(migrate); }
    catch { todos = []; } // JSON 解析失败时降级为空数组，防止应用崩溃
  }

  function saveTodos() { localStorage.setItem('cool-todos-pro', JSON.stringify(todos)); }

  // 优先级权重映射，数值越小优先级越高，用于排序比较
  function priorityWeight(p) { return p==='high'?0:p==='medium'?1:2; }

  // 多级排序：过期任务 > 未过期 > 进行中 > 已完成 > 按优先级 > 按拖拽顺序
  // 排序优先级：1.过期待办置顶 2.未完成在前 3.高优先级在前 4.保持用户拖拽顺序
  function sortTodos() {
    const today = new Date(); today.setHours(0,0,0,0); // 获取当天零点，用于日期比较
    todos.sort((a,b) => {
      // 判断是否已过期：有截止日期且截止日期早于今天
      const aOver = a.dueDate && new Date(a.dueDate+'T00:00:00')<today?1:0;
      const bOver = b.dueDate && new Date(b.dueDate+'T00:00:00')<today?1:0;
      if(aOver!==bOver) return bOver-aOver; // 过期的排前面
      if(a.done!==b.done) return a.done?1:-1; // 已完成的排后面
      const pw = priorityWeight(a.priority)-priorityWeight(b.priority);
      return pw!==0?pw:a.order-b.order; // 同级按用户拖拽顺序排列
    });
  }

  // 根据截止日期计算显示文本和样式类名，供渲染时展示到期提醒
  // 返回 null 表示无截止日期；cls 用于 CSS 高亮（overdue 红色闪烁 / soon 黄色）
  function getDueInfo(dueDate) {
    if(!dueDate) return null;
    const now=new Date(),due=new Date(dueDate+'T00:00:00'),today=new Date(now.getFullYear(),now.getMonth(),now.getDate());
    const diff=Math.floor((due-today)/86400000); // 距今天的天数差
    if(diff<0) return {text:'已过期',cls:'overdue'};   // 已过期，红色脉冲动画
    if(diff===0) return {text:'今天截止',cls:'soon'};  // 今天截止，黄色高亮
    if(diff===1) return {text:'明天截止',cls:'soon'};  // 明天截止，黄色高亮
    if(diff<=3) return {text:`${diff}天后截止`,cls:''}; // 3 天内，普通显示
    return {text:`${diff}天后`,cls:''};                 // 超过 3 天，简略显示
  }

  // 渲染核心：排序 -> 筛选 -> 更新进度 -> 渲染列表，每次状态变更后调用
  function render() {
    // 1. 排序所有任务
    sortTodos();
    // 2. 按状态筛选（进行中/已完成）
    let filtered = todos;
    if(filter==='active') filtered=filtered.filter(t=>!t.done);
    else if(filter==='done') filtered=filtered.filter(t=>t.done);
    // 3. 按分类筛选
    if(categoryFilter) filtered=filtered.filter(t=>t.category===categoryFilter);
    // 4. 按搜索关键词筛选（不区分大小写）
    if(searchQuery){ const q=searchQuery.toLowerCase(); filtered=filtered.filter(t=>t.text.toLowerCase().includes(q)); }

    // 5. 更新顶部进度统计
    const total=todos.length, done=todos.filter(t=>t.done).length;
    const pct=total===0?0:Math.round(done/total*100);
    $doneCount.textContent=done; $totalCount.textContent=total;
    $progressFill.style.width=pct+'%';
    const remaining=total-done;
    $remainingLabel.textContent=remaining===0?'🎉 全部完成！':`📌 还有 ${remaining} 项待完成`;
    $btnClear.style.display=done===0?'none':''; // 无已完成任务时隐藏清空按钮

    // 6. 空状态展示（根据当前筛选标签显示不同的空状态文案）
    if(filtered.length===0){
      const icons={all:'📝',active:'💪',done:'🏆'};
      const msgs={all:'还没有任务，添加一个吧',active:'所有任务都完成啦',done:'还没有已完成的任务'};
      $list.innerHTML=`<li class="empty-state"><span class="empty-icon">${icons[filter]}</span>${msgs[filter]}</li>`;
      return;
    }

    // 7. 渲染任务列表 HTML
    const catNames={work:'工作',personal:'个人',study:'学习'};
    const priLabels={high:'高',medium:'中',low:'低'};
    $list.innerHTML = filtered.map(t => {
      const due = getDueInfo(t.dueDate);
      return `<li class="todo-item${t.done?' done':''}" data-id="${t.id}" draggable="true">
        <span class="drag-handle" title="拖拽排序">⠿</span>
        <span class="priority-dot ${t.priority}" title="优先级:${priLabels[t.priority]}"></span>
        <div class="todo-check" data-action="toggle">${t.done?'✓':''}</div>
        <div class="todo-body">
          <div class="todo-text">${escapeHtml(t.text)}</div>
          <div class="todo-meta">${due?`<span class="due-badge ${due.cls}">📅 ${due.text}</span>`:''}</div>
        </div>
        ${t.category?`<span class="cat-tag ${t.category}">${catNames[t.category]||t.category}</span>`:''}
        <button class="todo-delete" data-action="delete" title="删除">✕</button>
      </li>`;
    }).join('');
  }

  // XSS 防护：将用户输入中的 HTML 特殊字符转义，防止注入攻击
  function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

  // 添加新任务：取当前列表最小 order 值减 1，使新任务始终排在最前面
  function addTodo(text){
    const t=text.trim(); if(!t) return;
    // 计算最小排序值，新任务置顶（order 越小越靠前）
    const minO=todos.length?Math.min(...todos.map(x=>x.order)):0;
    todos.push({id:Date.now(),text:t,done:false,priority:addOptions.priority,category:addOptions.category||'',dueDate:$dueDateInput.value||null,order:minO-1});
    saveTodos(); render();
  }

  // 切换任务完成状态：标记为完成时需确认，取消完成无需确认（防误操作只防"完成"不防"取消"）
  async function toggleTodo(id){ const t=todos.find(x=>x.id===id); if(!t) return; if(!t.done){const ok=await showConfirm({icon:'✅',title:'完成任务',text:`确定已完成 "${t.text}" 吗？`,confirmText:'确认完成'});if(!ok)return;} t.done=!t.done; saveTodos(); render(); }

  // 删除任务：先确认，确认后播放滑出动画，动画结束后再从数据中移除
  // skipConfirm 用于内部批量操作时跳过确认弹窗
  async function deleteTodo(id,skipConfirm=false){
    const todo=todos.find(t=>t.id===id); if(!todo) return;
    // 弹窗确认（可跳过，用于如"清空已完成"等批量操作）
    if(!skipConfirm){
      const ok=await showConfirm({icon:'🗑️',title:'确认删除',text:`确定要删除任务 "${todo.text}" 吗？此操作不可撤销。`,confirmText:'确认删除'});
      if(!ok) return;
    }
    const idx=todos.findIndex(t=>t.id===id); if(idx===-1) return;
    const $item=$list.querySelector(`[data-id="${id}"]`);
    // 若 DOM 元素存在：先播放移除动画，动画结束后再删除数据
    // 若 DOM 不存在（如被筛选隐藏）：直接从数据中删除
    if($item){$item.classList.add('removing');$item.addEventListener('animationend',function h(){$item.removeEventListener('animationend',h);todos.splice(todos.findIndex(t=>t.id===id),1);saveTodos();render();});}
    else {todos.splice(idx,1);saveTodos();render();}
  }

  function updateTodoText(id,newText){ const t=todos.find(x=>x.id===id); if(!t||!newText.trim()) return; t.text=newText.trim(); saveTodos(); render(); }

  // 批量清空已完成任务，需确认弹窗
  async function clearDone(){
    const dc=todos.filter(t=>t.done).length; if(dc===0) return; // 无已完成任务时不操作
    const ok=await showConfirm({icon:'🗑️',title:'清空已完成',text:`确定要清空 ${dc} 条已完成的任务吗？此操作不可撤销。`,confirmText:'确认清空'});
    if(!ok) return;
    todos=todos.filter(t=>!t.done); saveTodos(); render(); toast('✅ 已清空已完成任务');
  }

  function setFilter(f){filter=f;document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.filter===f));render();}
  function setCategoryFilter(c){categoryFilter=c;document.querySelectorAll('.cat-chip').forEach(ch=>ch.classList.toggle('active',ch.dataset.cat===c));render();}

  // 导出为 Excel 文件（依赖 SheetJS xlsx 库），包含序号/内容/状态/优先级/分类/截止日期
  function exportExcel(){
    const priNames={high:'高',medium:'中',low:'低'};
    const catNames={work:'工作',personal:'个人',study:'学习',other:'其他'};
    // 1. 将任务数据转为二维数组
    const data=todos.map((t,i)=>([
      i+1,
      t.text,
      t.done?'已完成':'进行中',
      priNames[t.priority]||'中',
      catNames[t.category]||(t.category||'无'),
      t.dueDate||''
    ]));
    // 2. 添加表头
    data.unshift(['序号','任务内容','状态','优先级','分类','截止日期']);
    const ws=XLSX.utils.aoa_to_sheet(data);
    // 3. 设置列宽（任务内容列最宽，容纳长文本）
    ws['!cols']=[
      {wch:6},{wch:40},{wch:8},{wch:8},{wch:8},{wch:14}
    ];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'待办清单');
    XLSX.writeFile(wb,`todos-${new Date().toISOString().slice(0,10)}.xlsx`);
    toast('✅ 已导出 Excel！');
  }
  // 导入 JSON 文件：读取后验证数组格式，对每条数据执行迁移补全字段
  function importJSON(file){
    const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(!Array.isArray(d))throw new Error();d.forEach(migrate);todos=d;saveTodos();render();toast(`✅ 已导入 ${d.length} 条任务`);}catch{toast('❌ 文件格式不正确');}};
    r.readAsText(file);
  }

  // 事件
  $btnAdd.addEventListener('click',()=>{addTodo($input.value);$input.value='';$input.focus();});
  $input.addEventListener('keydown',e=>{if(e.key==='Enter'){addTodo($input.value);$input.value='';}});
  $optionsPanel.addEventListener('click',e=>{const b=e.target.closest('[data-opt]');if(!b)return;const k=b.dataset.opt,v=b.dataset.val;addOptions[k]=v;$optionsPanel.querySelectorAll(`[data-opt="${k}"]`).forEach(x=>x.classList.toggle('sel',x.dataset.val===v));});
  $dueDateInput.addEventListener('change',()=>{$btnClearDate.style.display=$dueDateInput.value?'':'none';});
  $btnClearDate.addEventListener('click',()=>{$dueDateInput.value='';$btnClearDate.style.display='none';});

  // 列表点击事件：通过 data-action 属性区分切换完成/删除操作
  // 编辑状态下（存在 .todo-edit-input）不处理点击，防止误操作
  $list.addEventListener('click',e=>{if(document.querySelector('.todo-edit-input'))return;const $i=e.target.closest('.todo-item');if(!$i)return;const id=Number($i.dataset.id);if(e.target.dataset.action==='toggle'||e.target.classList.contains('todo-check'))toggleTodo(id);else if(e.target.dataset.action==='delete')deleteTodo(id);});
  // 双击任务文本进入内联编辑模式，已完成任务不可编辑
  $list.addEventListener('dblclick',e=>{const $t=e.target.closest('.todo-text');if(!$t)return;const $i=e.target.closest('.todo-item'),id=Number($i.dataset.id),todo=todos.find(t=>t.id===id);if(!todo||todo.done)return;const $inp=document.createElement('input');$inp.className='todo-edit-input';$inp.value=todo.text;$t.replaceWith($inp);$inp.focus();$inp.select();const save=()=>{updateTodoText(id,$inp.value);};$inp.addEventListener('blur',save);$inp.addEventListener('keydown',e=>{if(e.key==='Enter')save();if(e.key==='Escape')render();});});

  // 拖拽
  let draggedId=null;
  $list.addEventListener('dragstart',e=>{const $i=e.target.closest('.todo-item');if(!$i||e.target.closest('.todo-delete')||e.target.closest('.todo-check')){e.preventDefault();return;}draggedId=Number($i.dataset.id);$i.classList.add('dragging');e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain','');});
  $list.addEventListener('dragend',e=>{const $i=e.target.closest('.todo-item');if($i)$i.classList.remove('dragging');document.querySelectorAll('.todo-item.drag-over').forEach(el=>el.classList.remove('drag-over'));draggedId=null;});
  $list.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';const $i=e.target.closest('.todo-item');if(!$i||Number($i.dataset.id)===draggedId)return;document.querySelectorAll('.todo-item.drag-over').forEach(el=>el.classList.remove('drag-over'));$i.classList.add('drag-over');});
  $list.addEventListener('drop',e=>{e.preventDefault();const $t=e.target.closest('.todo-item');if(!$t||Number($t.dataset.id)===draggedId)return;const ti=todos.findIndex(t=>t.id===Number($t.dataset.id)),di=todos.findIndex(t=>t.id===draggedId);if(ti===-1||di===-1)return;const[m]=todos.splice(di,1);todos.splice(ti,0,m);todos.forEach((t,i)=>{t.order=i;});saveTodos();render();});

  $tabs.addEventListener('click',e=>{const t=e.target.closest('.tab');if(!t)return;setFilter(t.dataset.filter);});
  $categoryFilters.addEventListener('click',e=>{const c=e.target.closest('.cat-chip');if(!c)return;setCategoryFilter(c.dataset.cat);});
  $btnSearch.addEventListener('click',()=>{const o=$searchWrap.classList.toggle('open');if(o)$searchInput.focus();else{$searchInput.value='';searchQuery='';render();}});
  $searchInput.addEventListener('input',()=>{searchQuery=$searchInput.value;render();});
  $btnClear.addEventListener('click',clearDone);
  $btnExport.addEventListener('click',exportExcel);
  $btnImport.addEventListener('click',()=>$fileImport.click());
  $fileImport.addEventListener('change',()=>{if($fileImport.files[0]){importJSON($fileImport.files[0]);$fileImport.value='';}});

  // 主题
  let customThemes=[];
  const $customThemes=document.getElementById('customThemes');
  const $customImageInput=document.getElementById('customImageInput');
  const $btnAddTheme=document.getElementById('btnAddTheme');

  function loadCustomThemes(){
    try{customThemes=JSON.parse(localStorage.getItem('cool-todos-custom-themes')||'[]');}catch{customThemes=[];}
  }
  function saveCustomThemes(){localStorage.setItem('cool-todos-custom-themes',JSON.stringify(customThemes));}

  function switchTheme(name){
    document.documentElement.setAttribute('data-theme',name);
    localStorage.setItem('cool-todos-theme',name);
    refreshThemeActive();
  }

  function refreshThemeActive(){
    const cur=document.documentElement.getAttribute('data-theme');
    document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.dataset.theme===cur));
    $customThemes.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.dataset.theme===cur));
  }

  function injectThemeCSS(theme){
    const s=document.createElement('style');s.id='theme-'+theme.id;
    s.textContent=`
[data-theme="${theme.id}"]{--accent:${theme.accent};--accent-glow:rgba(232,145,176,0.4);--success:#c9a0dc;--danger:${theme.accent};--orb1:rgba(232,145,176,0.3);--orb2:rgba(201,160,220,0.25);--orb3:rgba(255,200,220,0.2)}
[data-theme="${theme.id}"] body{background:linear-gradient(180deg,rgba(30,15,40,0.12)0%,rgba(20,10,30,0.25)100%),url(data:image/jpeg;base64,${theme.base64})center/cover no-repeat scroll;background-color:#1a1020}
[data-theme="${theme.id}"] .app{background:rgba(30,15,40,0.55);backdrop-filter:none;-webkit-backdrop-filter:none}`;
    document.head.appendChild(s);
  }

  function removeThemeCSS(id){const s=document.getElementById('theme-'+id);if(s)s.remove();}

  function addCustomTheme(file){
    const r=new FileReader();r.onload=()=>{
      const b64=r.result.split(',')[1];
      const theme={id:'custom-'+Date.now(),name:'自定义'+(customThemes.length+1),base64:b64,accent:'#e891b0'};
      customThemes.push(theme);saveCustomThemes();
      injectThemeCSS(theme);renderCustomThemeBtns();switchTheme(theme.id);
      toast('✅ 自定义主题已添加');
    };r.readAsDataURL(file);
  }

  function deleteCustomTheme(id){
    const idx=customThemes.findIndex(t=>t.id===id);
    if(idx===-1)return;
    removeThemeCSS(id);customThemes.splice(idx,1);saveCustomThemes();
    renderCustomThemeBtns();
    const cur=document.documentElement.getAttribute('data-theme');
    if(cur===id)switchTheme('lumu');
    toast('🗑 主题已删除');
  }

  function renderCustomThemeBtns(){
    let html='';
    customThemes.forEach(t=>{
      html+=`<button class="theme-btn custom-btn" data-theme="${t.id}" title="${t.name}（长按删除）">🖼</button>`;
    });
    $customThemes.innerHTML=html;
    // bind events
    $customThemes.querySelectorAll('.custom-btn').forEach(b=>{
      b.addEventListener('click',()=>switchTheme(b.dataset.theme));
      let timer;
      b.addEventListener('touchstart',()=>{timer=setTimeout(()=>{deleteCustomTheme(b.dataset.theme)},800);});
      b.addEventListener('touchend',()=>clearTimeout(timer));
      b.addEventListener('touchmove',()=>clearTimeout(timer));
      b.addEventListener('contextmenu',e=>{e.preventDefault();deleteCustomTheme(b.dataset.theme);});
    });
    refreshThemeActive();
  }

  $btnAddTheme.addEventListener('click',()=>$customImageInput.click());
  $customImageInput.addEventListener('change',()=>{if($customImageInput.files[0]){addCustomTheme($customImageInput.files[0]);$customImageInput.value='';}});

  // 自动轮播
  let autoRotateTimer=null,autoRotateOn=false;
  const $btnAutoTheme=document.getElementById('btnAutoTheme');
  function getAllThemeNames(){
    const names=['lumu','lumu2','lumu4',...customThemes.map(t=>t.id)];
    return names;
  }
  function autoRotateStep(){
    const names=getAllThemeNames();
    const cur=document.documentElement.getAttribute('data-theme');
    const idx=names.indexOf(cur);
    const next=names[(idx+1)%names.length];
    switchTheme(next);
    autoRotateTimer=setTimeout(autoRotateStep,5000);
  }
  $btnAutoTheme.addEventListener('click',()=>{
    autoRotateOn=!autoRotateOn;
    if(autoRotateOn){$btnAutoTheme.textContent='⏸';autoRotateStep();toast('▶ 主题自动轮播中（5秒切换）');}
    else{$btnAutoTheme.textContent='▶';clearTimeout(autoRotateTimer);toast('⏹ 轮播已停止');}
  });

  // Init all themes
  loadCustomThemes();
  customThemes.forEach(t=>injectThemeCSS(t));
  const savedTheme=localStorage.getItem('cool-todos-theme')||'lumu';
  document.documentElement.setAttribute('data-theme',savedTheme);

  // Bind static theme buttons
  document.querySelectorAll('.theme-switcher > .theme-btn:not(.theme-btn-add)').forEach(b=>{
    b.addEventListener('click',()=>switchTheme(b.dataset.theme));
  });
  refreshThemeActive();
  renderCustomThemeBtns();

  // 启动
  loadTodos();render();
  $input.focus();
})();
</script>
</body>
</html>
